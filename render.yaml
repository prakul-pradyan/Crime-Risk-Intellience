services:
  - type: web
    name: crime-risk-backend
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGIN
        value: https://crime-risk-intellience.vercel.app
      - key: PYTHON_VERSION
        value: 3.10.0
